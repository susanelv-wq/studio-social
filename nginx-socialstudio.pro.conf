# Paste this ENTIRE content into aaPanel → Website → socialstudio.pro → Config file
# Replace everything in that file with the block below (nothing else in the file).

server {
    listen 80;
    server_name socialstudio.pro www.socialstudio.pro;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md) {
        return 404;
    }

    location ~ \.well-known {
        allow all;
    }

    access_log /www/wwwlogs/socialstudio.pro.log;
    error_log /www/wwwlogs/socialstudio.pro.error.log;
}
